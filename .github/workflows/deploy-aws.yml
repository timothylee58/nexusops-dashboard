# OIDC → Amazon ECR login → build/push :sha and :latest → optional App Runner redeploy.
name: Deploy to ECR

# Opt JavaScript actions into Node.js 24 before the runner default flip (see GitHub changelog).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# OIDC: id-token must be writable at workflow or job level so GitHub can mint the JWT for AWS STS.
permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      # Secret → variable → default (this repo targets ap-southeast-1). Override via repo variable AWS_REGION if needed.
      AWS_REGION_RESOLVED: ${{ secrets.AWS_REGION || vars.AWS_REGION || 'ap-southeast-1' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate OIDC and ECR configuration
        env:
          ROLE_ARN: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          ECR_REPO: ${{ secrets.ECR_REPOSITORY }}
        run: |
          set -euo pipefail
          if [ -z "${ROLE_ARN// }" ]; then
            echo "::error::Missing secret **AWS_ROLE_TO_ASSUME**. In AWS IAM, create a role trusted by GitHub's OIDC provider and add the role ARN under Repository secrets."
            echo "::notice::See README → GitHub Actions / Troubleshooting → «Credentials could not be loaded»."
            exit 1
          fi
          if [ -z "${ECR_REPO// }" ]; then
            echo "::error::Missing secret **ECR_REPOSITORY** (your ECR repository name only, not the full registry URL)."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION_RESOLVED }}
          audience: sts.amazonaws.com
          role-session-name: GitHubActions

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Start App Runner deployment
        env:
          SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}
        run: |
          if [ -z "$SERVICE_ARN" ]; then
            echo "APP_RUNNER_SERVICE_ARN not set — skip App Runner redeploy."
            exit 0
          fi
          aws apprunner start-deployment --service-arn "$SERVICE_ARN"
