# OIDC → ECR login → build/push → ECS task definition update → ECS service deploy.
name: Deploy to ECS

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-southeast-1
      ECR_REGISTRY: 385080556880.dkr.ecr.ap-southeast-1.amazonaws.com
      ECR_REPOSITORY: nexuspay
      ECS_CLUSTER: nexusops-cluster
      ECS_SERVICE: nexuspay-service
      TASK_DEFINITION_FAMILY: nexuspay-task
      CONTAINER_NAME: nexuspay

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          ROLE_ARN: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          set -euo pipefail
          if [ -z "${ROLE_ARN// }" ]; then
            echo "::error::Missing secret AWS_ROLE_TO_ASSUME. Add your IAM role ARN under Repository secrets."
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com
          role-session-name: GitHubActions-NexusPay

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Builds both :sha (immutable, for audit trail) and :latest (ECS pulls on deploy).
      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Pulls the current task definition from AWS and injects the new image URI.
      # This preserves all other task definition settings (CPU, memory, env vars, log config).
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEFINITION_FAMILY }} \
            --query taskDefinition \
            > task-definition.json

      - name: Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          # Waits for the new task to be healthy before marking the workflow green.
          wait-for-service-stability: true