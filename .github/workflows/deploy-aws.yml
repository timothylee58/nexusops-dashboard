# OIDC → Amazon ECR login → build/push :sha and :latest → optional App Runner redeploy.
name: Deploy to ECR

# Opt JavaScript actions into Node.js 24 before the runner default flip (see GitHub changelog).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write # Required for OIDC authentication
      contents: read # Required to check out the repository

    env:
      # Region is not sensitive — prefer repo variable AWS_REGION; secret overrides if both set.
      AWS_REGION_RESOLVED: ${{ secrets.AWS_REGION || vars.AWS_REGION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify AWS region is configured
        if: ${{ env.AWS_REGION_RESOLVED == '' }}
        run: |
          echo "::error::AWS region is missing. Add repository variable **AWS_REGION** (recommended, e.g. us-east-1) or secret **AWS_REGION** under Settings → Secrets and variables → Actions."
          exit 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION_RESOLVED }}
          role-session-name: GitHubActions

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Start App Runner deployment
        env:
          SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}
        run: |
          if [ -z "$SERVICE_ARN" ]; then
            echo "APP_RUNNER_SERVICE_ARN not set — skip App Runner redeploy."
            exit 0
          fi
          aws apprunner start-deployment --service-arn "$SERVICE_ARN"
